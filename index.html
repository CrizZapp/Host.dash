<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creador de páginas</title>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 16px;
    }
    .contenedor {
      max-width: 600px;
      margin: auto;
    }
    .pantalla { display: none; }
    .pantalla.activa { display: block; }
    input, textarea, button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
    }
    textarea {
      height: 220px;
      resize: vertical;
    }
    button {
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-publicar {
      background: #22c55e;
    }
    .btn-ia {
      background: #f59e0b; /* Color naranja para diferenciarlo */
      color: white;
    }
    .loading { 
      display: none; 
      text-align: center; 
      margin-top: 10px; 
      color: #f59e0b; 
      font-weight: bold; 
    }
  </style>
</head>
<body>

<div class="contenedor">

  <div id="pantalla1" class="pantalla activa">
    <h2>📱 Crea tu página</h2>
    <input id="nombrePagina" placeholder="Nombre de tu página">
    <button onclick="entrar()">Entrar</button>
  </div>

  <div id="pantalla2" class="pantalla">
    <h2 id="tituloPagina"></h2>
    <textarea id="htmlInput" placeholder="Pegá el HTML de tu pagina aca..."></textarea>
    <button onclick="verPagina(false)">👁 Ver</button>
    <button class="btn-ia" onclick="irAIa()">✨ Generar con IA</button>
    <button class="btn-publicar" onclick="verPagina(true)">🚀 Publicar</button>
    <button onclick="nuevaPagina()">➕ Crear otra página</button>
  </div>

  <div id="pantallaIa" class="pantalla">
    <h2>✨ Explícale a la IA...</h2>
    <textarea id="iaPrompt" placeholder="Ej: Crea una página con fondo negro, texto verde neón que diga HOLA MUNDO y un botón rojo..."></textarea>
    <div id="loader" class="loading">La IA está escribiendo el código... ⏳</div>
    <button class="btn-ia" id="btnGen" onclick="generarGratis()">Generar ahora</button>
    <button style="background:#475569; color:white;" onclick="irAEditor()">⬅ Volver al Editor</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
  // Tu Configuración
  const firebaseConfig = {
    apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
    authDomain: "ingresa-dfec2.firebaseapp.com",
    databaseURL: "https://ingresa-dfec2-default-rtdb.firebaseio.com",
    projectId: "ingresa-dfec2",
    storageBucket: "ingresa-dfec2.appspot.com",
    messagingSenderId: "441882283200",
    appId: "1:441882283200:web:8067df85facc2d67d77125"
  };

  // Inicializar Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let nombre = "";

  // 1. LÓGICA DE CARGA (DETECTA LINKS COMPARTIDOS)
  window.onload = async () => {
    const hash = location.hash.replace("#", "");
    
    if (hash) {
      // Buscamos en Firebase si esa página existe
      const snapshot = await db.ref("paginas/" + hash).once("value");
      if (snapshot.exists()) {
        nombre = hash;
        abrirVista(snapshot.val(), true);
        return;
      }
    }

    // Si no hay hash o no existe, cargar borrador local
    const draftNombre = localStorage.getItem("draft_nombre");
    const draftHtml = localStorage.getItem("draft_html");

    if (draftNombre && draftHtml) {
      nombre = draftNombre;
      document.getElementById("nombrePagina").value = draftNombre;
      document.getElementById("htmlInput").value = draftHtml;
      document.getElementById("tituloPagina").innerText = "Editando: " + nombre;
      document.getElementById("pantalla1").classList.remove("activa");
      document.getElementById("pantalla2").classList.add("activa");
    }
  };

  function entrar() {
    nombre = document.getElementById("nombrePagina").value.trim().replace(/\s+/g, '_');
    if (!nombre) return alert("Poné un nombre");
    localStorage.setItem("draft_nombre", nombre);
    document.getElementById("tituloPagina").innerText = "Editando: " + nombre;
    document.getElementById("pantalla1").classList.remove("activa");
    document.getElementById("pantalla2").classList.add("activa");
  }

  // 2. PUBLICAR EN LA NUBE
  async function verPagina(publicado) {
    const codigo = document.getElementById("htmlInput").value;
    localStorage.setItem("draft_html", codigo);

    if (publicado) {
      // Guardar en Firebase para que otros lo vean
      try {
        await db.ref("paginas/" + nombre).set(codigo);
        location.hash = nombre;
        alert("¡Página publicada globalmente!");
      } catch (e) {
        alert("Error al publicar: " + e.message);
      }
    }

    abrirVista(codigo, publicado);
  }

  // --- El resto de tus funciones (irAIa, generarGratis, abrirVista, etc.) se mantienen igual ---
  
  function irAIa() {
    document.getElementById("pantalla2").classList.remove("activa");
    document.getElementById("pantallaIa").classList.add("activa");
  }

  function irAEditor() {
    document.getElementById("pantallaIa").classList.remove("activa");
    document.getElementById("pantalla2").classList.add("activa");
  }

  async function generarGratis() {
    const promptUser = document.getElementById('iaPrompt').value;
    if (!promptUser) return alert("Dime qué quieres que haga la IA");

    const btn = document.getElementById('btnGen');
    const loader = document.getElementById('loader');
    btn.disabled = true;
    loader.style.display = "block";

    try {
      const response = await fetch("https://text.pollinations.ai/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: [
            { role: "system", content: "Eres un experto en HTML y CSS. Responde SOLO con el código solicitado. Sin explicaciones, sin markdown." },
            { role: "user", content: `Genera el código HTML y CSS para una página. Requisito: ${promptUser}` }
          ],
          model: "openai"
        })
      });

      const texto = await response.text();
      let codigoLimpio = texto.replace(/```html|```css|```/gi, "").trim();
      
      document.getElementById('htmlInput').value = codigoLimpio;
      localStorage.setItem("draft_html", codigoLimpio);
      irAEditor();

    } catch (error) {
      alert("Error al conectar con la IA.");
    } finally {
      btn.disabled = false;
      loader.style.display = "none";
    }
  }

  function nuevaPagina() {
    if (!confirm("¿Crear una página nueva?")) return;
    localStorage.removeItem("draft_nombre");
    localStorage.removeItem("draft_html");
    location.hash = "";
    location.reload();
  }

  function abrirVista(html, publicado) {
    document.open();
    document.write(`<!DOCTYPE html>
    <html>
    <head>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>\${nombre}</title>
      <style>
        body { margin:0; font-family:system-ui; }
        #barra { position:fixed; top:10px; left:10px; display:flex; gap:10px; z-index:9999; }
        .btn { background:black; color:white; padding:10px 14px; border-radius:10px; font-weight:bold; cursor:pointer; }
      </style>
    </head>
    <body>
      <div id="barra">
        \${publicado ? "" : '<div class="btn" onclick="location.reload()">⬅ Editor</div>'}
        <div class="btn" onclick="compartir()">📤 Compartir</div>
      </div>
      \${html}
      <script>
        function compartir() {
          const url = location.href;
          if (navigator.share) {
            navigator.share({ title: document.title, url });
          } else {
            navigator.clipboard.writeText(url);
            alert("Link copiado para compartir");
          }
        }
      <\/script>
    </body>
    </html>`);
    document.close();
  }
</script>

</body>
</html>
