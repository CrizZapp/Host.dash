<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-Termux | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0e14; color: #e2e8f0; font-family: 'Monaco', monospace; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid #334155; }
        .sidebar { width: 70px; transition: 0.3s; }
        .sidebar:hover { width: 200px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar bg-slate-900 border-r border-slate-800 flex flex-col items-center py-6 z-50">
        <div class="mb-10 text-blue-500 text-2xl"><i class="fas fa-microchip"></i></div>
        <nav class="flex-1 space-y-8">
            <button class="text-blue-500 block"><i class="fas fa-server"></i></button>
            <button onclick="logout()" class="text-red-500 block"><i class="fas fa-sign-out-alt"></i></button>
        </nav>
        <button onclick="location.href='panel.html'" class="text-slate-500 hover:text-white transition">
            <i class="fas fa-cog"></i>
        </button>
    </aside>

    <main class="flex-1 overflow-y-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-white">Mis Servidores</h1>
            <button onclick="createProject()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-bold text-sm transition">
                + NUEVO SERVER
            </button>
        </header>

        <div id="dashList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // Simulación de Auth básica (puedes conectar Firebase Auth aquí)
        if(!localStorage.getItem('user_session')) {
            const user = prompt("Ingresa tu usuario:");
            if(user) localStorage.setItem('user_session', user);
            else location.reload();
        }

        const DB = "https://ingresa-dfec2-default-rtdb.firebaseio.com/dominios.json";

        async function loadDash() {
            const r = await fetch(DB);
            const data = await r.json() || {};
            const cont = document.getElementById('dashList');
            cont.innerHTML = Object.entries(data).map(([id, p]) => `
                <div class="glass p-6 rounded-2xl relative group">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 bg-blue-500/10 rounded-lg flex items-center justify-center text-blue-500">
                            <i class="fas fa-terminal"></i>
                        </div>
                        <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400 uppercase tracking-tighter">${id.slice(-5)}</span>
                    </div>
                    <h3 class="font-bold text-lg">${p.nombre}</h3>
                    <p class="text-xs text-slate-500 mb-4">Status: <span class="${p.status === 'start' ? 'text-green-500' : 'text-red-500'}">${p.status}</span></p>
                    
                    <div class="flex gap-2">
                        <button onclick="location.href='panel.html?id=${id}'" class="flex-1 bg-slate-800 hover:bg-slate-700 p-2 rounded-lg text-xs font-bold transition">
                            ADMINISTRAR
                        </button>
                        <button onclick="location.href='panel.html?id=${id}&tab=editor'" class="bg-slate-800 hover:bg-slate-700 p-2 px-3 rounded-lg text-xs transition">
                            <i class="fas fa-code"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function logout() {
            localStorage.removeItem('user_session');
            location.reload();
        }

        loadDash();
    </script>
</body>
</html>
