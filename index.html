<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creador de páginas</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: white; margin: 0; padding: 16px; }
    .contenedor { max-width: 600px; margin: auto; }
    .pantalla { display: none; }
    .pantalla.activa { display: block; }
    input, textarea, button { width: 100%; margin-top: 12px; padding: 12px; font-size: 16px; border-radius: 10px; border: none; }
    textarea { height: 220px; resize: vertical; }
    button { background: #38bdf8; font-weight: bold; cursor: pointer; }
    .btn-publicar { background: #22c55e; }
    .btn-ia { background: #f59e0b; color: white; }
    .loading { display: none; text-align: center; margin-top: 10px; color: #f59e0b; font-weight: bold; }
  </style>
</head>
<body>

<div class="contenedor">
  <div id="pantalla1" class="pantalla activa">
    <h2>📱 Crea tu página</h2>
    <input id="nombrePagina" placeholder="Nombre de tu página">
    <button onclick="entrar()">Entrar</button>
  </div>

  <div id="pantalla2" class="pantalla">
    <h2 id="tituloPagina"></h2>
    <textarea id="htmlInput" placeholder="Pegá el HTML acá..."></textarea>
    <button onclick="verPagina(false)">👁 Ver</button>
    <button class="btn-ia" onclick="irAIa()">✨ Generar con IA</button>
    <button class="btn-publicar" onclick="verPagina(true)">🚀 Publicar</button>
    <button onclick="nuevaPagina()">➕ Crear otra página</button>
  </div>

  <div id="pantallaIa" class="pantalla">
    <h2>✨ Explícale a la IA...</h2>
    <textarea id="iaPrompt" placeholder="Ej: Una landing page neon..."></textarea>
    <div id="loader" class="loading">Generando código... ⏳</div>
    <button class="btn-ia" id="btnGen" onclick="generarGratis()">Generar ahora</button>
    <button style="background:#475569; color:white;" onclick="irAEditor()">⬅ Volver</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
    authDomain: "ingresa-dfec2.firebaseapp.com",
    databaseURL: "https://ingresa-dfec2-default-rtdb.firebaseio.com",
    projectId: "ingresa-dfec2",
    storageBucket: "ingresa-dfec2.appspot.com",
    messagingSenderId: "441882283200",
    appId: "1:441882283200:web:8067df85facc2d67d77125"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let nombre = "";

  // 1. CARGA CRÍTICA: SI HAY HASH, MOSTRAR WEB (PRIORIDAD ABSOLUTA)
  window.onload = async () => {
    const hash = location.hash.replace("#", "");
    if (hash) {
      try {
        const snapshot = await db.ref("paginas/" + hash).once("value");
        if (snapshot.exists()) {
          nombre = hash;
          abrirVista(snapshot.val(), true);
          return; // Detiene todo lo demás
        }
      } catch (e) { console.error("Error Firebase:", e); }
    }

    // Si no hay nada, carga el editor normal
    const dNombre = localStorage.getItem("draft_nombre");
    const dHtml = localStorage.getItem("draft_html");
    if (dNombre) {
      nombre = dNombre;
      document.getElementById("nombrePagina").value = dNombre;
      document.getElementById("htmlInput").value = dHtml || "";
      document.getElementById("tituloPagina").innerText = "Editando: " + nombre;
      document.getElementById("pantalla1").classList.remove("activa");
      document.getElementById("pantalla2").classList.add("activa");
    }
  };

  function entrar() {
    nombre = document.getElementById("nombrePagina").value.trim().replace(/\s+/g, '_');
    if (!nombre) return alert("Poné un nombre");
    localStorage.setItem("draft_nombre", nombre);
    document.getElementById("tituloPagina").innerText = "Editando: " + nombre;
    document.getElementById("pantalla1").classList.remove("activa");
    document.getElementById("pantalla2").classList.add("activa");
  }

  async function verPagina(publicado) {
    const codigo = document.getElementById("htmlInput").value;
    localStorage.setItem("draft_html", codigo);

    if (publicado) {
      try {
        await db.ref("paginas/" + nombre).set(codigo);
        // Forzamos el hash en la URL antes de abrir la vista
        window.location.hash = nombre;
        alert("¡Publicado con éxito!");
      } catch (e) { alert("Error al publicar."); return; }
    }
    abrirVista(codigo, publicado);
  }

  function irAIa() { document.getElementById("pantalla2").classList.remove("activa"); document.getElementById("pantallaIa").classList.add("activa"); }
  function irAEditor() { document.getElementById("pantallaIa").classList.remove("activa"); document.getElementById("pantalla2").classList.add("activa"); }

  async function generarGratis() {
    const promptUser = document.getElementById('iaPrompt').value;
    if (!promptUser) return alert("Dime qué quieres");
    const btn = document.getElementById('btnGen');
    const loader = document.getElementById('loader');
    btn.disabled = true; loader.style.display = "block";

    try {
      const response = await fetch("https://text.pollinations.ai/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: [{ role: "system", content: "Responde SOLO el código HTML/CSS, sin explicaciones." },
                     { role: "user", content: `Genera una web para ${nombre}: ${promptUser}` }],
          model: "openai"
        })
      });
      const texto = await response.text();
      let codigo = texto.replace(/```html|```css|```/gi, "").trim();
      document.getElementById('htmlInput').value = codigo;
      localStorage.setItem("draft_html", codigo);
      irAEditor();
    } catch (e) { alert("Error IA"); } finally { btn.disabled = false; loader.style.display = "none"; }
  }

  function nuevaPagina() {
    if (confirm("¿Nueva página?")) { localStorage.clear(); location.hash = ""; location.reload(); }
  }

  function abrirVista(html, publicado) {
    const editorBtn = publicado ? "" : '<div class="btn" onclick="location.reload()">⬅ Editor</div>';
    
    // El script de compartir ahora construye la URL manualmente con el nombre de la página
    document.open();
    document.write(`<!DOCTYPE html>
    <html>
    <head>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>${nombre}</title>
      <style>
        body { margin:0; font-family:system-ui; }
        #barra { position:fixed; top:10px; left:10px; display:flex; gap:10px; z-index:9999; }
        .btn { background:black; color:white; padding:10px 14px; border-radius:10px; font-weight:bold; cursor:pointer; font-size:14px; }
      </style>
    </head>
    <body>
      <div id="barra">
        ${editorBtn}
        <div class="btn" onclick="compartir()">📤 Compartir Link</div>
      </div>
      ${html}
      <script>
        function compartir() {
          // Construimos el link manualmente para asegurar que lleve el hash
          const link = window.location.origin + window.location.pathname + "#${nombre}";
          if (navigator.share) {
            navigator.share({ title: "${nombre}", url: link });
          } else {
            const temp = document.createElement("input");
            document.body.appendChild(temp);
            temp.value = link;
            temp.select();
            document.execCommand("copy");
            document.body.removeChild(temp);
            alert("Link con hash copiado: " + link);
          }
        }
      <\/script>
    </body>
    </html>`);
    document.close();
  }
</script>
</body>
</html>
