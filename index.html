 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creador de páginas</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: white; margin: 0; padding: 16px; }
    .contenedor { max-width: 600px; margin: auto; }
    .pantalla { display: none; }
    .pantalla.activa { display: block; }
    input, textarea, button { width: 100%; margin-top: 12px; padding: 12px; font-size: 16px; border-radius: 10px; border: none; }
    textarea { height: 220px; resize: vertical; }
    button { background: #38bdf8; font-weight: bold; cursor: pointer; color: #000; }
    .btn-publicar { background: #22c55e; color: white; }
    .btn-ia { background: #f59e0b; color: white; }
    .loading { display: none; text-align: center; margin-top: 10px; color: #f59e0b; font-weight: bold; }
.animacion-latido {
  animation: latido 1.5s infinite;
  color: #38bdf8;
}

@keyframes latido {
  0% { opacity: 0.4; transform: scale(0.98); }
  50% { opacity: 1; transform: scale(1); }
  100% { opacity: 0.4; transform: scale(0.98); }
}

  </style>
</head>
<body>

<div id="pantallaCarga" class="pantalla">
  <div style="text-align: center; margin-top: 50px;">
    <div id="estadoCarga">
      <h2 class="animacion-latido">Cargando proyecto...</h2>
      <p>Buscando en la base de datos de CrizZapp</p>
    </div>
    <div id="estadoError" style="display:none;">
      <h2>⚠️ Proyecto no encontrado</h2>
      <p>El link es incorrecto o la página fue eliminada.</p>
      <button onclick="location.hash=''; location.reload()">Crear mi propia página</button>
    </div>
  </div>
</div>

<div class="contenedor">
  <div id="pantalla1" class="pantalla activa">
    <h2>📱 Crea tu página</h2>
    <input id="nombrePagina" placeholder="Nombre de tu página (ej: miweb)">
    <button onclick="entrar()">Entrar al Editor</button>
  </div>

  <div id="pantalla2" class="pantalla">
    <h2 id="tituloPagina"></h2>
    <textarea id="htmlInput" placeholder="Pegá tu HTML o generá uno con IA..."></textarea>
    <button onclick="verPagina(false)">👁 Ver Previa</button>
    <button class="btn-ia" onclick="irAIa()">✨ Generar con IA</button>
    <button class="btn-publicar" onclick="verPagina(true)">🚀 Publicar y Obtener Link</button>
    <button style="background:#475569; color:white;" onclick="nuevaPagina()">➕ Nueva Página</button>
  </div>

  <div id="pantallaIa" class="pantalla">
    <h2>✨ Explícale a la IA...</h2>
    <textarea id="iaPrompt" placeholder="Ej: Crea una página para mi bot con botones de colores y fondo galáctico..."></textarea>
    <div id="loader" class="loading">Escribiendo código... ⏳</div>
    <button class="btn-ia" id="btnGen" onclick="generarGratis()">Generar ahora</button>
    <button style="background:#475569; color:white;" onclick="irAEditor()">⬅ Volver</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
    authDomain: "ingresa-dfec2.firebaseapp.com",
    databaseURL: "https://ingresa-dfec2-default-rtdb.firebaseio.com",
    projectId: "ingresa-dfec2",
    storageBucket: "ingresa-dfec2.appspot.com",
    messagingSenderId: "441882283200",
    appId: "1:441882283200:web:8067df85facc2d67d77125"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let nombreGlobal = "";

  // CARGA INICIAL
window.onload = async () => {
  const hash = window.location.hash.replace("#", "");
  
  if (hash) {
    // Mostramos pantalla de carga inmediatamente
    document.getElementById("pantalla1").classList.remove("activa");
    document.getElementById("pantallaCarga").classList.add("activa");

    try {
      const snapshot = await db.ref("paginas/" + hash).once("value");
      if (snapshot.exists()) {
        nombreGlobal = hash;
        abrirVista(snapshot.val(), true);
      } else {
        // Si no existe, cambiamos el mensaje de carga por el de error
        document.getElementById("estadoCarga").style.display = "none";
        document.getElementById("estadoError").style.display = "block";
      }
    } catch (e) {
      alert("Error de conexión");
    }
    return; // Detenemos la ejecución aquí si hay hash
  }

  // Si no hay hash, cargamos el editor normal o el borrador
  const dNombre = localStorage.getItem("draft_nombre");
  const dHtml = localStorage.getItem("draft_html");
  if (dNombre) {
    nombreGlobal = dNombre;
    document.getElementById("nombrePagina").value = dNombre;
    document.getElementById("htmlInput").value = dHtml || "";
    document.getElementById("tituloPagina").innerText = "Editando: " + dNombre;
    document.getElementById("pantalla1").classList.remove("activa");
    document.getElementById("pantalla2").classList.add("activa");
  }
};


  function entrar() {
    nombreGlobal = document.getElementById("nombrePagina").value.trim().replace(/\s+/g, '_');
    if (!nombreGlobal) return alert("Poné un nombre");
    localStorage.setItem("draft_nombre", nombreGlobal);
    document.getElementById("tituloPagina").innerText = "Editando: " + nombreGlobal;
    document.getElementById("pantalla1").classList.remove("activa");
    document.getElementById("pantalla2").classList.add("activa");
  }

  async function verPagina(publicado) {
    const codigo = document.getElementById("htmlInput").value;
    localStorage.setItem("draft_html", codigo);

    if (publicado) {
      try {
        await db.ref("paginas/" + nombreGlobal).set(codigo);
        window.location.hash = nombreGlobal;
        alert("¡Publicado! Ahora usa el botón 'Compartir' para pasar el link.");
      } catch (e) {
        alert("Error de Firebase: " + e.message);
        return;
      }
    }
    abrirVista(codigo, publicado);
  }

  function irAIa() { document.getElementById("pantalla2").classList.remove("activa"); document.getElementById("pantallaIa").classList.add("activa"); }
  function irAEditor() { document.getElementById("pantallaIa").classList.remove("activa"); document.getElementById("pantalla2").classList.add("activa"); }

  async function generarGratis() {
    const prompt = document.getElementById('iaPrompt').value;
    if (!prompt) return alert("Dime qué quieres");
    const btn = document.getElementById('btnGen');
    const loader = document.getElementById('loader');
    btn.disabled = true; loader.style.display = "block";

    try {
      const response = await fetch("https://text.pollinations.ai/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: [{ role: "system", content: "Solo responde el código HTML/CSS, sin texto adicional." },
                     { role: "user", content: `Crea una web HTML/CSS para: ${prompt}` }],
          model: "openai"
        })
      });
      const texto = await response.text();
      let codigo = texto.replace(/```html|```css|```/gi, "").trim();
      document.getElementById('htmlInput').value = codigo;
      localStorage.setItem("draft_html", codigo);
      irAEditor();
    } catch (e) { alert("Error IA"); } finally { btn.disabled = false; loader.style.display = "none"; }
  }

  function nuevaPagina() {
    if (confirm("¿Borrar todo y crear otra?")) { localStorage.clear(); location.hash = ""; location.reload(); }
  }

  function abrirVista(html, publicado) {
    const editorBtn = publicado ? "" : '<button class="btn" onclick="location.reload()">⬅ Editor</button>';
    const currentName = nombreGlobal;
    
    document.open();
    document.write(`<!DOCTYPE html>
    <html>
    <head>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>${currentName}</title>
      <style>
        body { margin:0; font-family:sans-serif; }
        #nav-tools { position:fixed; top:10px; left:10px; display:flex; gap:10px; z-index:99999; }
        .btn { background:#000; color:#fff; padding:10px; border-radius:8px; border:none; cursor:pointer; font-weight:bold; font-size:12px; }
      </style>
    </head>
    <body>
      <div id="nav-tools">
        ${editorBtn}
        <button class="btn" onclick="shareMe()">📤 Compartir</button>
      </div>
      ${html}
      <script>
        function shareMe() {
          const finalUrl = window.location.origin + window.location.pathname + "#${currentName}";
          if (navigator.share) {
            navigator.share({ title: "${currentName}", url: finalUrl });
          } else {
            const el = document.createElement('textarea');
            el.value = finalUrl;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Link copiado: " + finalUrl);
          }
        }
      <\/script>
    </body>
    </html>`);
    document.close();
  }
</script>
</body>
</html>
