<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Web Pro</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --success: #22c55e;
      --warn: #f59e0b;
      --text: #f8fafc;
    }

    * { box-sizing: border-box; transition: all 0.2s ease; }
    
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      margin: 0; 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .contenedor { 
      width: 100%;
      max-width: 500px; 
      padding: 24px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      margin: 16px;
    }

    .pantalla { display: none; }
    .pantalla.activa { display: block; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    h2 { margin-top: 0; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); }

    input, textarea { 
      width: 100%; 
      background: #334155; 
      border: 2px solid transparent;
      color: white;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      margin-bottom: 12px;
    }

    input:focus, textarea:focus { border-color: var(--accent); outline: none; background: #3d4e66; }

    textarea { height: 250px; font-family: 'Fira Code', monospace; font-size: 13px; }

    button { 
      width: 100%; 
      padding: 14px; 
      border-radius: 12px; 
      border: none; 
      font-weight: bold; 
      cursor: pointer; 
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-main { background: var(--accent); color: #003b57; }
    .btn-ia { background: var(--warn); color: white; }
    .btn-pub { background: var(--success); color: white; }
    .btn-sec { background: #475569; color: white; }

    button:hover { filter: brightness(1.1); transform: translateY(-2px); }
    button:active { transform: translateY(0); }

    /* Loader */
    .loading-box { text-align: center; padding: 40px 0; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

<div id="pantallaCarga" class="pantalla">
  <div class="loading-box">
    <div class="spinner"></div>
    <h3>Cargando tu proyecto...</h3>
  </div>
</div>

<div class="contenedor" id="mainBox">
  
  <div id="pantalla1" class="pantalla activa">
    <h2>🚀 Mi Web</h2>
    <input id="nombrePagina" placeholder="Nombre de tu proyecto...">
    <button class="btn-main" onclick="entrar()">Empezar a editar</button>
  </div>

  <div id="pantalla2" class="pantalla">
    <h2 id="tituloPagina" style="font-size: 1.2rem; opacity: 0.7;"></h2>
    <textarea id="htmlInput" placeholder="Escribe código o usa la IA..."></textarea>
    <button class="btn-main" onclick="verPagina(false)">👁 Vista Previa</button>
    <button class="btn-ia" onclick="irAIa()">✨ Generar con IA</button>
    <button class="btn-pub" onclick="verPagina(true)">🚀 Publicar Web</button>
    <button class="btn-sec" onclick="nuevaPagina()">Resetear</button>
  </div>

  <div id="pantallaIa" class="pantalla">
    <h2>✨ Cerebro IA</h2>
    <textarea id="iaPrompt" placeholder="Ej: Una landing page de color neón con efecto de estrellas..."></textarea>
    <div id="loader" class="loading-box" style="display:none;">
      <div class="spinner"></div>
      <p>Programando para ti...</p>
    </div>
    <button class="btn-ia" id="btnGen" onclick="generarGratis()">Generar Código</button>
    <button class="btn-sec" onclick="irAEditor()">Cancelar</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
    authDomain: "ingresa-dfec2.firebaseapp.com",
    databaseURL: "https://ingresa-dfec2-default-rtdb.firebaseio.com",
    projectId: "ingresa-dfec2",
    storageBucket: "ingresa-dfec2.appspot.com",
    messagingSenderId: "441882283200",
    appId: "1:441882283200:web:8067df85facc2d67d77125"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let nombreGlobal = "";

  window.onload = async () => {
    const hash = window.location.hash.replace("#", "");
    if (hash) {
      document.getElementById("mainBox").style.display = "none";
      document.getElementById("pantallaCarga").classList.add("activa");
      try {
        const snapshot = await db.ref("paginas/" + hash).once("value");
        if (snapshot.exists()) {
          nombreGlobal = hash;
          abrirVista(snapshot.val(), true);
        } else {
          alert("No se encontró la página");
          location.hash = ""; location.reload();
        }
      } catch (e) { alert("Error de red"); }
      return;
    }

    const dNombre = localStorage.getItem("draft_nombre");
    if (dNombre) {
      nombreGlobal = dNombre;
      document.getElementById("nombrePagina").value = dNombre;
      document.getElementById("htmlInput").value = localStorage.getItem("draft_html") || "";
      document.getElementById("tituloPagina").innerText = "Proyecto: " + dNombre;
      cambiarPantalla("pantalla2");
    }
  };

  function entrar() {
    nombreGlobal = document.getElementById("nombrePagina").value.trim().replace(/\s+/g, '_');
    if (!nombreGlobal) return alert("Dale un nombre");
    localStorage.setItem("draft_nombre", nombreGlobal);
    document.getElementById("tituloPagina").innerText = "Proyecto: " + nombreGlobal;
    cambiarPantalla("pantalla2");
  }

  function cambiarPantalla(id) {
    document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
    document.getElementById(id).classList.add('activa');
  }

  async function verPagina(publicado) {
    const codigo = document.getElementById("htmlInput").value;
    localStorage.setItem("draft_html", codigo);
    if (publicado) {
      await db.ref("paginas/" + nombreGlobal).set(codigo);
      window.location.hash = nombreGlobal;
      alert("¡Web publicada con éxito!");
    }
    abrirVista(codigo, publicado);
  }

  function irAIa() { cambiarPantalla("pantallaIa"); }
  function irAEditor() { cambiarPantalla("pantalla2"); }

  async function generarGratis() {
    const prompt = document.getElementById('iaPrompt').value;
    if (!prompt) return alert("Escribe qué quieres");
    const btn = document.getElementById('btnGen');
    const loader = document.getElementById('loader');
    
    btn.style.display = "none";
    loader.style.display = "block";

    try {
      const response = await fetch("https://text.pollinations.ai/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: [
            { role: "system", content: "Eres un programador experto. Responde EXCLUSIVAMENTE con el código HTML y CSS solicitado. No incluyas explicaciones, ni comentarios, ni bloques de texto fuera del código." },
            { role: "user", content: `Crea un código HTML/CSS completo y moderno para: ${prompt}.` }
          ],
          model: "openai"
        })
      });
      const texto = await response.text();
      // Limpieza profunda de markdown si la IA ignora el system prompt
      let codigo = texto.replace(/```html|```css|```/gi, "").trim();
      document.getElementById('htmlInput').value = codigo;
      localStorage.setItem("draft_html", codigo);
      irAEditor();
    } catch (e) { alert("Error con la IA"); } finally { 
      btn.style.display = "block"; 
      loader.style.display = "none"; 
    }
  }

  function nuevaPagina() {
    if (confirm("¿Seguro? Se borrará el borrador actual.")) { 
      localStorage.clear(); location.hash = ""; location.reload(); 
    }
  }

  function abrirVista(html, publicado) {
    const currentName = nombreGlobal;
    const ui = publicado ? "" : `<button onclick="location.reload()" style="position:fixed; top:10px; left:10px; z-index:10000; background:#000; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">⬅ Volver al Editor</button>`;
    
    document.open();
    document.write(`
      ${ui}
      <button onclick="share()" style="position:fixed; top:10px; right:10px; z-index:10000; background:#38bdf8; color:#000; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">📤 Compartir</button>
      ${html}
      <script>
        function share() {
          const url = window.location.href;
          if(navigator.share) { navigator.share({url}); }
          else { navigator.clipboard.writeText(url); alert("Copiado al portapapeles"); }
        }
      <\/script>
    `);
    document.close();
  }
</script>
</body>
</html>
